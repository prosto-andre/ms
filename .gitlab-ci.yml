include:
  - project: 'ps/infra/ci-pipelines'
    ref: 'master'
    file: '/frontend-ci.yml'

registry:
  stage: build
  variables:
    GIT_STRATEGY: fetch
  rules:
    - if: '$CI_COMMIT_REF_NAME == "master" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master" || $CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_TAG == null '
      when: on_success
  image:
    name: ${DOCKER_TOOLS_IMAGE}
    pull_policy: if-not-present
  before_script:
    - docker login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
  script:
    - docker pull "${CI_REGISTRY}/${CI_PROJECT_PATH}:latest" || true
    - |
      BUILD_ARGS=""
      if [ -n "${PAYLOAD_SECRET:-}" ]; then
        BUILD_ARGS="--build-arg PAYLOAD_SECRET=${PAYLOAD_SECRET}"
      fi

      docker build \
        --cache-from "${CI_REGISTRY}/${CI_PROJECT_PATH}:latest" \
        ${BUILD_ARGS} \
        --label "branch=$CI_COMMIT_REF_NAME" \
        --label "revision=$CI_COMMIT_SHA" \
        --label "build_number=$CI_PIPELINE_ID" \
        --label "build_details=$CI_JOB_URL" \
        --label "build_by=$GITLAB_USER_NAME" \
        --tag "${CI_REGISTRY}/${CI_PROJECT_PATH}:${CI_COMMIT_SHA}" \
        --tag "${CI_REGISTRY}/${CI_PROJECT_PATH}:${CI_COMMIT_REF_SLUG}" \
        .
    - docker push "${CI_REGISTRY}/${CI_PROJECT_PATH}:${CI_COMMIT_SHA}"
    - docker push "${CI_REGISTRY}/${CI_PROJECT_PATH}:${CI_COMMIT_REF_SLUG}"

variables:
  SOURCE_DIR: './'
  GIT_SUBMODULE_STRATEGY: recursive
  GIT_SUBMODULE_FORCE_HTTPS: 'true'

owasp_dependency_check:
  extends: owasp_dependency_check_new_node
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"'
